<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>签名页</title>
    <link rel="stylesheet" href="/static/sign.css">
  </head>
<body>
  <main class="sign-shell">
    <section class="sign-card">
      <p class="eyebrow">现场签名</p>
      <h1>我承诺：</h1>
      <p id="pledgeLine" class="subtitle">正在加载宣誓文案...</p>

      <div class="canvas-frame">
        <canvas id="signatureCanvas"></canvas>
      </div>
      <p id="phoneSigningHint" class="canvas-hint hidden">手机端点击签名框，可进入宽屏签名模式。</p>

      <div class="actions">
        <button id="resetButton" type="button" class="secondary">重置</button>
        <button id="submitButton" type="button" class="primary">提交</button>
      </div>

      <p id="statusMessage" class="status" aria-live="polite"></p>
    </section>
  </main>

  <div id="toastCelebration" class="toast-celebration hidden" aria-hidden="true"></div>
  <div id="toastMessage" class="toast hidden" role="status" aria-live="assertive" aria-atomic="true"></div>

  <div id="expandedSigningOverlay" class="sign-overlay hidden" aria-hidden="true">
    <section class="sign-overlay-panel">
      <div class="sign-overlay-stage">
        <div class="sign-overlay-rotated">
          <div class="rotated-workbench">
            <div class="sign-overlay-frame">
              <canvas id="expandedSignatureCanvas"></canvas>
            </div>
            <div class="sign-overlay-rail">
              <p class="overlay-eyebrow vertical-text">宽屏签名</p>
              <button id="expandedCloseButton" type="button" class="overlay-close">返回</button>
              <button id="expandedResetButton" type="button" class="secondary overlay-mini">重置</button>
              <button id="expandedSubmitButton" type="button" class="primary overlay-mini">提交</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="/static/sign.js" defer></script>
</body>
</html>
