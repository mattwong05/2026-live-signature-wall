name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[build,dev]

      - name: Run tests
        env:
          SIGNATURE_WALL_NO_BROWSER: "1"
        run: |
          python -m pytest -q

      - name: Build Windows app folder
        run: .\build_windows.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: signature-wall-windows
          path: dist/signature-wall
          if-no-files-found: error
